<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
    <title>Triva Quiz for JJ</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-div">
          <h1>JJ Trivia Quiz</h1>
          <nav>
            <label for="total-question" class="dropdown-title"
              >Total Question:</label
            >
            <select name="total-question" id="total-question">
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
            </select>
            <label for="quiz-category" class="dropdown-title"
              >Quiz Category:</label
            >
            <select name="quiz-category" id="quiz-category">
              <option value="17">Science & Nature</option>
              <option value="22">Geography</option>
              <option value="28">Vehicle</option>
            </select>
            <label for="difficulty-category" class="dropdown-title"
              >Difficulty:</label
            >
            <select name="difficulty-category" id="difficulty-category">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
            <button id="start-btn">Start</button>
          </nav>
        </div>
      </header>
      <main class="main-quiz"></main>
    </div>
  </body>
</html>
